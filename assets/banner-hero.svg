<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Screen Split">
  <defs>
    <linearGradient id="ssBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="ssBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="ssName" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <radialGradient id="ssGlow" cx="82%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ssGrid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#3B82F6" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#ssBg)"/>
  <rect width="1200" height="400" fill="url(#ssGrid)"/>
  <rect width="1200" height="400" fill="url(#ssGlow)"/>

  <g transform="translate(80, 54)">
    <rect width="144" height="28" rx="14" fill="#3B82F6" fill-opacity="0.12" stroke="#3B82F6" stroke-opacity="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#3B82F6"/>
    <text x="80" y="18.5" text-anchor="middle" fill="#93C5FD" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2.2">DESKTOP · APP</text>
  </g>

  <text x="80" y="240" fill="url(#ssName)" font-family="'Instrument Serif','Georgia',serif" font-size="176" letter-spacing="-5">Screen Split<tspan fill="#3B82F6">.</tspan></text>

  <text x="82" y="288" fill="#E2E8F0" fill-opacity="0.6" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="18" font-weight="300">Your screen and your camera, side by side, with a brand logo overlay. Built for showing up.</text>

  <g transform="translate(80, 324)" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1.6">
    <g>
      <rect width="86" height="26" rx="13" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.4"/>
      <text x="43" y="17" text-anchor="middle" fill="#93C5FD">PYTHON</text>
    </g>
    <g transform="translate(94, 0)">
      <rect width="76" height="26" rx="13" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.4"/>
      <text x="38" y="17" text-anchor="middle" fill="#93C5FD">PYQT6</text>
    </g>
    <g transform="translate(178, 0)">
      <rect width="88" height="26" rx="13" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.4"/>
      <text x="44" y="17" text-anchor="middle" fill="#93C5FD">OPENCV</text>
    </g>
    <g transform="translate(274, 0)">
      <rect width="78" height="26" rx="13" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.4"/>
      <text x="39" y="17" text-anchor="middle" fill="#93C5FD">WIN32</text>
    </g>
    <g transform="translate(360, 0)">
      <rect width="90" height="26" rx="13" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.4"/>
      <text x="45" y="17" text-anchor="middle" fill="#93C5FD">WINDOWS</text>
    </g>
  </g>

  <g transform="translate(920, 200)">
    <rect x="-160" y="-80" width="144" height="160" rx="10" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.5" stroke-width="1.5"/>
    <g transform="translate(-88, 0)" opacity="0.8">
      <rect x="-50" y="-50" width="100" height="100" rx="4" fill="#1E293B"/>
      <path d="M -40 20 L -20 -10 L 0 10 L 20 -20 L 40 10 L 40 40 L -40 40 Z" fill="#3B82F6" opacity="0.5"/>
      <circle cx="-18" cy="-22" r="8" fill="#60A5FA" opacity="0.6"/>
    </g>
    <rect x="16" y="-80" width="144" height="160" rx="10" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.5" stroke-width="1.5"/>
    <g transform="translate(88, 0)" opacity="0.8">
      <circle cx="0" cy="-10" r="28" fill="#475569"/>
      <ellipse cx="0" cy="40" rx="40" ry="22" fill="#475569"/>
    </g>
    <path d="M -14 -90 L -14 90 M 14 -90 L 14 90" stroke="#3B82F6" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 4"/>
  </g>
</svg>
